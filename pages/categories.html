<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Browse Services - ServiceLoop</title>
  <link rel="icon" type="image/avif" href="../images/logo/slicon.avif" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="categories-directory-page" data-categories-page>
    <section class="categories-directory-hero">
      <span class="categories-directory-kicker">All Services</span>
      <h1>Browse every ServiceLoop service</h1>
      <p>Search services and jump straight into specialists filtered by the work you need.</p>
    </section>

    <section class="categories-directory-toolbar">
      <div class="search-bar categories-directory-search">
        <span class="search-icon" aria-hidden="true">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
            <circle cx="11" cy="11" r="8"></circle><path d="M21 21l-4.35-4.35"></path>
          </svg>
        </span>
        <input type="text" placeholder="Search services" data-categories-search />
      </div>
      <p class="categories-directory-count" data-categories-count>Loading services</p>
    </section>

    <section class="categories-directory-grid" data-categories-grid></section>
    <div class="categories-directory-empty" data-categories-empty hidden>
      <i class="fa-solid fa-layer-group"></i>
      <h2>No services matched that search</h2>
      <p>Try another service or trade name to narrow the list.</p>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="../js/shared-header.js"></script>
  <script src="../js/search-intelligence.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/providers-ui.js"></script>
</body>
</html>
