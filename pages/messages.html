<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages – WorkLinkUp</title>
  <link rel="icon" type="image/jpeg" href="../images/logo/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="messages-page" data-messages-page>
    <div class="messages-layout">
      <aside class="messages-sidebar">
        <h1>Messages</h1>
        <div class="messages-chat-list" data-chat-list></div>
      </aside>
      <section class="messages-thread">
        <div class="messages-thread-head">
          <strong data-message-thread-title>Messages</strong>
          <span class="provider-meta-chip">WorkLinkUp Chat</span>
        </div>
        <div class="messages-thread-body" data-message-thread></div>
        <form class="messages-thread-compose" data-messages-compose>
          <input class="messages-compose-input" type="text" placeholder="Type a message..." data-messages-compose-input />
          <button type="submit" class="messages-send-btn">Send</button>
        </form>
      </section>
    </div>
  </main>

  <div id="site-footer"></div>

  <script src="../js/shared-header.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
