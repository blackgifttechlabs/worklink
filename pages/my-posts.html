<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Posts – WorkLinkUp</title>
  <link rel="icon" type="image/jpeg" href="../images/logo/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="provider-post-shell provider-posts-page" data-provider-posts-page>
    <section class="provider-posts-hero">
      <div class="provider-posts-hero-inner">
        <span class="section-eyebrow provider-posts-kicker">My Posts</span>
        <h1>Share your work like a portfolio feed</h1>
        <p>Upload your best work and keep your provider profile active for clients.</p>
      </div>
    </section>

    <section class="provider-post-layout provider-posts-board">
      <aside class="provider-post-composer">
        <div class="provider-post-composer-head">
          <h2>Create post</h2>
          <span></span>
        </div>
        <form data-provider-post-form class="provider-post-form">
          <label class="provider-post-dropzone" data-provider-post-dropzone>
            <input type="file" accept="image/*" data-provider-post-image />
            <span class="provider-post-wave" aria-hidden="true"></span>
            <span class="provider-post-wave is-second" aria-hidden="true"></span>
            <span class="provider-post-upload-icon"><i class="fa-solid fa-cloud-arrow-up"></i></span>
            <strong>Drop your work image here</strong>
            <small>Tap to upload, then crop it before writing your caption.</small>
          </label>
          <div class="provider-post-preview" data-provider-post-preview hidden></div>
          <div class="provider-post-caption-wrap" data-provider-post-caption-wrap hidden>
            <label for="provider-post-caption">Write a caption</label>
            <textarea id="provider-post-caption" placeholder="Tell clients what you did in this work..." data-provider-post-caption></textarea>
          </div>
          <button type="submit" class="provider-post-submit" data-provider-post-submit disabled>Post to My Work</button>
        </form>
      </aside>
      <div class="provider-post-feed-divider">
        <span>Posted work</span>
      </div>
      <section class="provider-post-feed" data-provider-post-feed></section>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="../js/shared-header.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
