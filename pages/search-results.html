<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Search Results - WorkLinkUp</title>
  <link rel="icon" type="image/avif" href="../images/logo/joblinks.avif" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body class="search-results-body">
  <div id="site-header"></div>

  <main class="search-results-page" data-search-results-page>
    <section class="search-results-mobile-head">
      <button type="button" class="search-results-back" data-search-back aria-label="Go back">
        <i class="fa-solid fa-arrow-left"></i>
      </button>
      <form class="search-results-searchbar" data-search-results-form>
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="search" name="query" data-search-results-input placeholder="Search services" autocomplete="off" />
      </form>
      <button type="button" class="search-results-filter-btn" data-search-filter-open aria-label="Open filters">
        <i class="fa-solid fa-filter"></i>
        <span data-search-filter-dot hidden></span>
      </button>
    </section>

    <section class="search-results-toolbar">
      <div class="search-results-summary">
        <p data-search-results-count>Searching WorkLinkUp</p>
        <h1 data-search-results-title>Results</h1>
      </div>
      <label class="search-results-sort">
        <span>Most relevant</span>
        <select data-search-sort>
          <option value="relevant">Most relevant</option>
          <option value="rating">Top rated</option>
          <option value="near">Nearest match</option>
        </select>
      </label>
    </section>

    <section class="search-results-active-filters" data-search-active-filters aria-label="Active filters"></section>

    <section class="search-results-shell" data-search-results-shell>
      <section class="search-results-best" data-search-best-results>
        <article class="search-result-card is-loading"></article>
      </section>

      <section class="search-results-related-block" data-search-related-block hidden>
        <div class="search-results-section-head">
          <h2>Related results</h2>
          <button type="button" data-search-view-all-related>View all <i class="fa-solid fa-chevron-right"></i></button>
        </div>
        <div class="search-results-related-track" data-search-related-results></div>
      </section>

      <section class="search-results-popular" data-search-popular-block>
        <h2>Popular searches</h2>
        <div class="search-results-popular-chips" data-search-popular-chips></div>
      </section>

      <section class="search-results-grid" data-search-results-grid>
        <article class="search-result-card is-loading"></article>
        <article class="search-result-card is-loading"></article>
        <article class="search-result-card is-loading"></article>
        <article class="search-result-card is-loading"></article>
      </section>
    </section>
  </main>

  <div class="search-filter-dialog" data-search-filter-dialog hidden>
    <div class="search-filter-backdrop" data-search-filter-close></div>
    <aside class="search-filter-panel" aria-label="Search filters">
      <div class="search-filter-panel-head">
        <div>
          <span>Filters</span>
          <strong>Refine results</strong>
        </div>
        <button type="button" class="search-filter-close" data-search-filter-close aria-label="Close filters">
          <i class="fa-solid fa-xmark"></i>
        </button>
      </div>

      <div class="search-filter-group">
        <h2>Rating</h2>
        <div class="search-filter-options" data-search-rating-options>
          <button type="button" data-search-rating="0">All ratings</button>
          <button type="button" data-search-rating="5">5.0+</button>
          <button type="button" data-search-rating="4.5">4.5+</button>
          <button type="button" data-search-rating="4">4.0+</button>
        </div>
      </div>

      <div class="search-filter-group">
        <h2>Category</h2>
        <div class="search-filter-options is-scrollable" data-search-category-options></div>
      </div>

      <div class="search-filter-actions">
        <button type="button" class="search-filter-reset" data-search-filter-reset>Reset</button>
        <button type="button" class="search-filter-apply" data-search-filter-close>Show results</button>
      </div>
    </aside>
  </div>

  <div id="site-footer"></div>

  <script src="../js/shared-header.js"></script>
  <script src="../js/search-intelligence.js"></script>
  <script src="../js/main.js"></script>
  <script src="../js/search-results.js"></script>
</body>
</html>
