<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Wishlist – SoftGiggles</title>
  <link rel="icon" type="image/png" href="../images/logo/baby-giggles-logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>

<div id="site-header"></div>

<main class="wishlist-page">
  <section class="wishlist-empty-state">
    <div class="wishlist-empty-icon">
      <i class="fa-regular fa-heart"></i>
    </div>
    <h1>Your wishlist is empty!.</h1>
    <p>Like what you see but want to buy it later, add your favourites by shopping our departments!</p>
  </section>

  <section class="wishlist-trending">
    <h2>Shop our Trending Categories</h2>
    <div class="wishlist-trending-shell">
      <button type="button" class="wishlist-scroll-btn" aria-label="Previous categories">
        <i class="fa-solid fa-chevron-left"></i>
      </button>
      <div class="wishlist-trending-row">
        <article class="wishlist-trending-card">
          <div class="wishlist-trending-image">
            <img src="../images/products/IMG-20260207-WA0020.jpg" alt="Girls fleece" />
          </div>
          <h3>Girls Fleece</h3>
        </article>
        <article class="wishlist-trending-card">
          <div class="wishlist-trending-image">
            <img src="../images/products/IMG-20260306-WA0015.jpg" alt="Toddler dresses" />
          </div>
          <h3>Toddler Dresses</h3>
        </article>
        <article class="wishlist-trending-card">
          <div class="wishlist-trending-image">
            <img src="../images/products/IMG-20260306-WA0019.jpg" alt="Girls pinafores" />
          </div>
          <h3>Girls Pinafores</h3>
        </article>
        <article class="wishlist-trending-card">
          <div class="wishlist-trending-image">
            <img src="../images/products/IMG-20260310-WA0018.jpg" alt="Boys tracksuits" />
          </div>
          <h3>Boys Tracksuits</h3>
        </article>
        <article class="wishlist-trending-card">
          <div class="wishlist-trending-image">
            <img src="../images/products/IMG-20260310-WA0017.jpg" alt="Boys tracktops" />
          </div>
          <h3>Boys Tracktops</h3>
        </article>
        <article class="wishlist-trending-card">
          <div class="wishlist-trending-image">
            <img src="../images/products/IMG-20260310-WA0019.jpg" alt="Denim jackets" />
          </div>
          <h3>Denim Jackets</h3>
        </article>
        <article class="wishlist-trending-card">
          <div class="wishlist-trending-image">
            <img src="../images/products/IMG-20260310-WA0021.jpg" alt="Baby shoes" />
          </div>
          <h3>Baby Shoes</h3>
        </article>
      </div>
      <button type="button" class="wishlist-scroll-btn" aria-label="Next categories">
        <i class="fa-solid fa-chevron-right"></i>
      </button>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="../js/shared-header.js"></script>
<script src="../js/main.js"></script>
</body>
</html>
