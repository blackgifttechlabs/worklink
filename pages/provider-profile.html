<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Provider Profile – WorkLinkUp</title>
  <link rel="icon" type="image/png" href="../images/logo/logo.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="provider-profile-page" data-provider-profile-page>
    <section class="provider-profile-shell">
      <section class="provider-profile-hero">
        <div class="provider-profile-banner" data-provider-banner></div>
        <div class="provider-profile-summary">
          <div class="provider-profile-avatar-ring">
            <img src="../images/logo/logo.png" alt="Provider profile" data-provider-avatar />
          </div>
          <div class="provider-profile-summary-main">
            <div class="provider-profile-summary-top">
              <div>
                <div class="provider-profile-handle" data-provider-handle>@provider</div>
                <h1 data-provider-name>Loading provider...</h1>
              </div>
              <div class="provider-profile-actions">
                <a href="#" class="provider-profile-action" data-provider-message-link>Message</a>
                <a href="#" class="provider-profile-action secondary" data-provider-whatsapp-link target="_blank" rel="noreferrer">WhatsApp</a>
              </div>
            </div>
            <div class="provider-profile-stats">
              <div><strong data-provider-post-count>0</strong><span>posts</span></div>
              <div><strong data-provider-rating>0.0 ★</strong><span>rating</span></div>
              <div><strong data-provider-jobs>0</strong><span>jobs done</span></div>
            </div>
            <div class="provider-profile-bio-card">
              <p class="provider-profile-title" data-provider-title></p>
              <p class="provider-profile-address" data-provider-address></p>
              <p class="provider-profile-bio" data-provider-bio></p>
            </div>
          </div>
        </div>
      </section>

      <section class="provider-profile-highlights" data-provider-highlights></section>

      <section class="provider-profile-gallery-head">
        <div class="provider-profile-gallery-tab is-active">
          <i class="fa-solid fa-table-cells-large"></i>
          <span>Previous Work</span>
        </div>
      </section>

      <section class="provider-profile-gallery" data-provider-post-grid>
        <div class="specialists-empty">Loading provider profile...</div>
      </section>
    </section>
  </main>

  <div id="site-footer"></div>

  <script src="../js/shared-header.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
