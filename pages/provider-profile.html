<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Provider Profile – WorkLinkUp</title>
  <link rel="icon" type="image/avif" href="../images/logo/joblinks.avif" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div id="site-header"></div>

  <main class="provider-profile-page is-loading" data-provider-profile-page>
    <div class="provider-profile-skeleton-shell" aria-hidden="true">
      <section class="provider-profile-hero provider-profile-skeleton-hero">
        <div class="provider-profile-skeleton-banner">
          <div class="provider-profile-skeleton-back provider-skeleton-block"></div>
          <div class="provider-profile-skeleton-avatar provider-skeleton-block"></div>
          <div class="provider-profile-skeleton-copy">
            <span class="provider-skeleton-line provider-skeleton-line-name"></span>
            <span class="provider-skeleton-line provider-skeleton-line-meta"></span>
          </div>
        </div>
        <section class="provider-profile-summary">
          <div class="provider-profile-summary-main provider-profile-skeleton-summary">
            <div class="provider-profile-skeleton-actions">
              <span class="provider-skeleton-chip"></span>
              <span class="provider-skeleton-chip"></span>
            </div>
            <div class="provider-profile-skeleton-stats">
              <span class="provider-skeleton-line provider-skeleton-line-stat"></span>
              <span class="provider-skeleton-line provider-skeleton-line-stat"></span>
              <span class="provider-skeleton-line provider-skeleton-line-stat"></span>
            </div>
            <div class="provider-profile-skeleton-meta">
              <span class="provider-skeleton-line provider-skeleton-line-meta-wide"></span>
              <span class="provider-skeleton-line provider-skeleton-line-meta-wide"></span>
            </div>
            <div class="provider-profile-skeleton-bio">
              <span class="provider-skeleton-line provider-skeleton-line-bio"></span>
              <span class="provider-skeleton-line provider-skeleton-line-bio short"></span>
            </div>
          </div>
        </section>
      </section>

      <section class="provider-profile-gallery-head provider-profile-gallery-head-skeleton">
        <div class="provider-profile-gallery-tab is-active">
          <span>Previous Work</span>
        </div>
      </section>

      <section class="provider-profile-gallery">
        <article class="provider-gallery-skeleton"></article>
        <article class="provider-gallery-skeleton"></article>
        <article class="provider-gallery-skeleton"></article>
        <article class="provider-gallery-skeleton"></article>
      </section>
    </div>

    <div class="provider-profile-live">
      <section class="provider-profile-hero">
        <div class="provider-profile-banner" data-provider-banner>
          <button type="button" class="provider-profile-back" data-provider-back aria-label="Go back">
            <i class="fa-solid fa-arrow-left"></i>
          </button>
          <div class="provider-profile-avatar-ring">
            <img src="../images/sections/profileimg.avif" alt="Provider profile" data-provider-avatar />
          </div>

          <div class="provider-profile-banner-copy">
            <h1 data-provider-name>Loading provider...</h1>
            <div class="provider-profile-banner-meta">
              <div class="provider-profile-handle" data-provider-handle>@provider</div>
              <a href="#" class="provider-profile-phone" data-provider-phone-link>
                <i class="fa-solid fa-phone"></i>
                <span data-provider-phone>Loading number...</span>
              </a>
            </div>
          </div>
        </div>

        <section class="provider-profile-summary">
          <div class="provider-profile-summary-main">
            <!-- Divider line -->
            <div class="provider-profile-divider"></div>

            <!-- Quick actions row (My Jobs, Messages, Documents) -->
            <div class="provider-profile-actions-compact">
              <a href="job-giver-profile.html" class="provider-profile-action-compact" data-provider-my-jobs hidden>
                <i class="fa-solid fa-briefcase"></i>
                <span>My Jobs</span>
              </a>
              <a href="#" class="provider-profile-action-compact" data-provider-message-link>
                <i class="fa-solid fa-envelope"></i>
                <span>Messages</span>
              </a>
              <button type="button" class="provider-profile-action-compact" data-provider-documents-trigger hidden>
                <i class="fa-solid fa-file-pdf"></i>
                <span>Documents</span>
              </button>
            </div>

            <!-- Stats row (Posts, Rating, Jobs done) -->
            <div class="provider-profile-stats-row">
              <div class="provider-stat-item">
                <div class="provider-stat-label">Posts</div>
                <div class="provider-stat-value" data-provider-post-count>0</div>
              </div>
              <button type="button" class="provider-stat-item provider-stat-clickable" data-provider-rating-modal>
                <div class="provider-stat-label">Rating</div>
                <div class="provider-stat-value" data-provider-rating>0.0 ★</div>
              </button>
              <button type="button" class="provider-stat-item provider-stat-clickable" data-provider-jobs-modal>
                <div class="provider-stat-label">Jobs Done</div>
                <div class="provider-stat-value" data-provider-jobs>0</div>
              </button>
            </div>

            <!-- Services list -->
            <div class="provider-profile-services" data-provider-services-container hidden>
              <h3>Services</h3>
              <div class="provider-services-list" data-provider-services></div>
            </div>

            <!-- Location -->
            <div class="provider-profile-location" data-provider-address-container>
              <i class="fa-solid fa-location-dot"></i>
              <span data-provider-address></span>
            </div>

            <!-- Skills and expertise link -->
            <button type="button" class="provider-profile-skills-link" data-provider-skills-modal>
              <i class="fa-solid fa-wand-magic-sparkles"></i>
              <span>Skills and expertise</span>
              <i class="fa-solid fa-chevron-right"></i>
            </button>

            <p class="provider-profile-bio" data-provider-bio></p>

            <!-- Edit profile button (for own profile) -->
            <div class="provider-profile-edit-section" hidden>
              <button type="button" class="provider-profile-action secondary" data-provider-edit-profile>Edit Profile</button>
            </div>
          </div>
        </section>
      </section>

      <section class="provider-profile-gallery-head">
        <div class="provider-profile-gallery-tabs">
          <button type="button" class="provider-profile-gallery-tab is-active" data-gallery-tab="previous">
            <span>Previous Work</span>
          </button>
          <button type="button" class="provider-profile-gallery-tab" data-gallery-tab="current">
            <span>Current Jobs</span>
            <span class="provider-profile-tab-badge" data-provider-current-count hidden>0</span>
          </button>
          <button type="button" class="provider-profile-gallery-tab" data-gallery-tab="worked">
            <span>Jobs Worked</span>
          </button>
          <button type="button" class="provider-profile-gallery-tab" data-gallery-tab="bids" hidden>
            <span>Bids I Placed</span>
          </button>
        </div>
      </section>

      <section class="provider-profile-gallery" data-provider-post-grid data-gallery-content="previous">
        <article class="provider-gallery-skeleton"></article>
        <article class="provider-gallery-skeleton"></article>
        <article class="provider-gallery-skeleton"></article>
        <article class="provider-gallery-skeleton"></article>
      </section>

      <section class="provider-profile-gallery" data-provider-current-grid data-gallery-content="current" hidden>
        <article class="provider-gallery-skeleton"></article>
        <article class="provider-gallery-skeleton"></article>
        <article class="provider-gallery-skeleton"></article>
        <article class="provider-gallery-skeleton"></article>
      </section>

      <section class="provider-profile-gallery" data-provider-worked-grid data-gallery-content="worked" hidden>
        <article class="provider-gallery-skeleton"></article>
        <article class="provider-gallery-skeleton"></article>
        <article class="provider-gallery-skeleton"></article>
        <article class="provider-gallery-skeleton"></article>
      </section>

      <section class="provider-profile-gallery" data-provider-bids-grid data-gallery-content="bids" hidden>
        <article class="provider-gallery-skeleton"></article>
        <article class="provider-gallery-skeleton"></article>
        <article class="provider-gallery-skeleton"></article>
        <article class="provider-gallery-skeleton"></article>
      </section>
    </div>
  </main>

  <div class="provider-dialog-overlay" data-provider-dialog-overlay hidden>
    <div class="provider-dialog" role="dialog" aria-modal="true">
      <button type="button" class="provider-dialog-close" data-provider-dialog-close aria-label="Close dialog">×</button>
      <div data-provider-dialog-body></div>
    </div>
  </div>

  <div id="site-footer"></div>

  <script src="../js/shared-header.js"></script>
  <script src="../js/search-intelligence.js"></script>
  <script src="../js/main.js"></script>
</body>
</html>
