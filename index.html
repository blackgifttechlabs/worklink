<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorkLinkUp — Zimbabwe Work Marketplace</title>
  <link rel="icon" type="image/jpeg" href="images/logo/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="home-page-body">

<div id="site-header"></div>

<main class="homepage-main">
  <section class="categories-section homepage-categories home-stream-hero" id="service-types">
    <div class="home-stream-shell">
      <div class="home-stream-copy">
        <span class="home-stream-kicker">WorkLinkUp</span>
        <h1>Find Job  Find Worker</h1>
        <p>"Two needs. One platform. Endless possibilities. Across every industry."</p>
        <div class="fleece-btns home-stream-actions">
          <a href="pages/specialists.html" class="btn-primary">Find Specialist</a>
          <button type="button" class="btn-secondary fleece-secondary" data-home-get-found>Get Found</button>
        </div>
      </div>

      <div class="home-stream-discovery">
        <div class="home-stream-panel home-stream-category-panel">
          <div class="worklinkup-rail-shell homepage-categories-rail">
            <button type="button" class="worklinkup-rail-arrow is-prev" data-scroll-prev aria-label="Scroll categories left">
              <i class="fa-solid fa-chevron-left"></i>
            </button>
            <div class="homepage-categories-track-wrap">
              <div class="category-circles" data-home-categories data-scroll-track></div>
            </div>
            <button type="button" class="worklinkup-rail-arrow is-next" data-scroll-next aria-label="Scroll categories right">
              <i class="fa-solid fa-chevron-right"></i>
            </button>
          </div>
        </div>

        <div class="home-stream-panel home-stream-trending-panel">
          <h2 class="home-stream-row-title">Searched Services In Zimbabwe</h2>
          <div class="worklinkup-rail-shell home-trending-jobs-shell">
            <button type="button" class="worklinkup-rail-arrow is-prev" data-scroll-prev aria-label="Scroll trending jobs left">
              <i class="fa-solid fa-chevron-left"></i>
            </button>
            <div class="home-trending-jobs-track-wrap">
              <div class="home-trending-jobs-track" data-home-trending-jobs data-scroll-track></div>
            </div>
            <button type="button" class="worklinkup-rail-arrow is-next" data-scroll-next aria-label="Scroll trending jobs right">
              <i class="fa-solid fa-chevron-right"></i>
            </button>
          </div>
        </div>
      </div>
    </div>
  </section>

  <section class="home-job-cta">
    <div class="home-job-cta-copy">
      <span class="home-job-cta-kicker">Need Work Done?</span>
      <h2>Looking for Someone to do a Job for You?</h2>
      <p>Post your job and get the bidders.</p>
    </div>
    <div class="home-job-cta-actions">
      <a href="pages/post-job.html" class="btn-primary home-job-cta-btn">Post Job</a>
      <a href="pages/job-posts.html" class="btn-secondary fleece-secondary home-job-cta-btn">View Available Jobs</a>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="js/shared-header.js"></script>
<script src="js/main.js"></script>
</body>
</html>
