<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f45132" />
    <meta name="description" content="Service Loop connects Zimbabwe with trusted local service providers, jobs, and everyday services — all in one place." />

    <!-- Favicon (shows as the circular logo) -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />

    <title>Service Loop — Find trusted local services in Zimbabwe</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Service Loop" />
    <meta property="og:title" content="Service Loop — Find trusted local services" />
    <meta property="og:description" content="Service Loop connects Zimbabwe with trusted local service providers, jobs, and everyday services." />
    <meta property="og:image" content="https://serviceloop.co.zw/logo.png" />
    <meta property="og:url" content="https://serviceloop.co.zw/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Service Loop — Find trusted local services" />
    <meta name="twitter:description" content="Connecting Zimbabwe with trusted local services, jobs, and providers." />
    <meta name="twitter:image" content="https://serviceloop.co.zw/logo.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://serviceloop.co.zw/" />

    <!-- Organization schema: drives the logo/name in search -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Service Loop",
      "url": "https://serviceloop.co.zw",
      "logo": "https://serviceloop.co.zw/logo.png",
      "description": "Service Loop connects Zimbabwe with trusted local service providers, jobs, and everyday services."
    }
    </script>

    <!-- WebSite schema with search box: helps Google offer a search box under your result -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Service Loop",
      "url": "https://serviceloop.co.zw",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://serviceloop.co.zw/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>

    <!-- SiteNavigationElement: hints at sitelinks -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ItemList",
      "itemListElement": [
        { "@type": "SiteNavigationElement", "position": 1, "name": "How It Works", "url": "https://serviceloop.co.zw/how-it-works" },
        { "@type": "SiteNavigationElement", "position": 2, "name": "About", "url": "https://serviceloop.co.zw/about" },
        { "@type": "SiteNavigationElement", "position": 3, "name": "Providers", "url": "https://serviceloop.co.zw/providers" },
        { "@type": "SiteNavigationElement", "position": 4, "name": "Contact", "url": "https://serviceloop.co.zw/contact" }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
