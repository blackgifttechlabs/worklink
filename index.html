<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WorkLinkUp — Zimbabwe Work Marketplace</title>
  <link rel="icon" type="image/jpeg" href="images/logo/logo.jpg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans:ital,opsz,wght@0,17..18,400..700;1,17..18,400..700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="home-page-body">

<div id="site-header"></div>

<main class="homepage-main">
  <section class="categories-section homepage-categories" id="service-types">
    <h2 class="section-title">Find or Get Found</h2>
    <div class="category-circles">
      <a href="pages/specialists.html?category=Home%20Services" class="category-circle">
        <div class="category-circle-img">
          <img src="images/categories/home-services.avif" alt="Home Services" loading="lazy" decoding="async" />
        </div>
        <span>Home Services</span>
      </a>

      <a href="pages/specialists.html?category=Beauty%20%26%20Wellness" class="category-circle">
        <div class="category-circle-img">
          <img src="images/categories/beauty-and-wellness.avif" alt="Beauty and Wellness" loading="lazy" decoding="async" />
        </div>
        <span>Beauty &amp; Wellness</span>
      </a>

      <a href="pages/specialists.html?category=Digital%20%26%20Business" class="category-circle">
        <div class="category-circle-img">
          <img src="images/categories/business.avif" alt="Digital and Business" loading="lazy" decoding="async" />
        </div>
        <span>Digital &amp; Business</span>
      </a>

      <a href="pages/specialists.html?category=Plumbing" class="category-circle">
        <div class="category-circle-img">
          <img src="images/categories/plumbing.avif" alt="Plumbing" loading="lazy" decoding="async" />
        </div>
        <span>Plumbing</span>
      </a>

      <a href="pages/specialists.html?category=Security%20Services" class="category-circle">
        <div class="category-circle-img">
          <img src="images/categories/security-services.avif" alt="Security Services" loading="lazy" decoding="async" />
        </div>
        <span>Security Services</span>
      </a>

      <a href="pages/specialists.html?category=Tutoring" class="category-circle">
        <div class="category-circle-img">
          <img src="images/categories/tutoring.avif" alt="Tutoring" loading="lazy" decoding="async" />
        </div>
        <span>Tutoring</span>
      </a>

      <a href="pages/specialists.html?category=Childcare" class="category-circle">
        <div class="category-circle-img">
          <img src="images/categories/childcare.avif" alt="Childcare" loading="lazy" decoding="async" />
        </div>
        <span>Childcare</span>
      </a>

      <a href="pages/specialists.html?category=Photography" class="category-circle">
        <div class="category-circle-img">
          <img src="images/categories/photography.avif" alt="Photography" loading="lazy" decoding="async" />
        </div>
        <span>Photography</span>
      </a>
    </div>
  </section>

  <section class="fleece-banner homepage-banner">
    <div class="fleece-banner-img">
      <picture>
        <source media="(max-width: 768px)" srcset="images/sections/findme.avif" type="image/avif" />
        <img src="images/sections/findme.avif" alt="WorkLinkUp services" width="1000" height="667" fetchpriority="high" decoding="async" />
      </picture>
    </div>
    <div class="fleece-banner-content">
      <h2>WorkLinkUp</h2>
      <p>Find the right person for the job, or create your profile and get found for the work you do in Zimbabwe.</p>
      <div class="fleece-btns">
        <button class="btn-primary" onclick="location.href='pages/specialists.html'">Find Specialist</button>
        <button class="btn-secondary fleece-secondary" onclick="location.href='pages/account.html'">Get Found</button>
      </div>
    </div>
  </section>
</main>

<div id="site-footer"></div>

<script src="js/shared-header.js"></script>
<script src="js/main.js"></script>
</body>
</html>
