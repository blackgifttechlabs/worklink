<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#f45132" />
    <meta name="description" content="Service Loop: Zimbabwe's leading marketplace for local services and jobs. Connect with verified plumbers, gardeners, solar installers, and more in Harare, Bulawayo, Mutare, and across all provinces." />
    <meta name="keywords" content="Zimbabwe services, jobs in Zimbabwe, Harare plumbers, Bulawayo electricians, Mutare gardening, solar installation Zimbabwe, local workers, service marketplace, find jobs Zimbabwe, hire local help, Gweru, Kwekwe, Masvingo, Chinhoyi, Marondera, Bindura, Victoria Falls" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet" />

    <title>Service Loop — Local Services & Jobs in Zimbabwe</title>

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Service Loop" />
    <meta property="og:title" content="Service Loop — Find Trusted Local Services in Zimbabwe" />
    <meta property="og:description" content="Connect with verified service providers and find jobs across Zimbabwe. The simplest way to hire local talent." />
    <meta property="og:image" content="https://serviceloop.co.zw/logo.png" />
    <meta property="og:url" content="https://serviceloop.co.zw/" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Service Loop — Zimbabwe's Local Service Marketplace" />
    <meta name="twitter:description" content="Find trusted local services and jobs in Zimbabwe. Verified providers in Harare, Bulawayo, and beyond." />
    <meta name="twitter:image" content="https://serviceloop.co.zw/logo.png" />

    <!-- Canonical -->
    <link rel="canonical" href="https://serviceloop.co.zw/" />

    <!-- Organization schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Service Loop",
      "url": "https://serviceloop.co.zw",
      "logo": "https://serviceloop.co.zw/logo.png",
      "sameAs": [
        "https://facebook.com/serviceloopzw",
        "https://instagram.com/serviceloopzw"
      ],
      "description": "Service Loop connects Zimbabwe with trusted local service providers, jobs, and everyday services."
    }
    </script>

    <!-- WebSite schema -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "Service Loop",
      "url": "https://serviceloop.co.zw",
      "potentialAction": {
        "@type": "SearchAction",
        "target": "https://serviceloop.co.zw/search?q={search_term_string}",
        "query-input": "required name=search_term_string"
      }
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
